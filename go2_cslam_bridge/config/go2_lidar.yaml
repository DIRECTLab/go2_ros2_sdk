/**:
  ros__parameters:
    frontend:
      odom_topic: "odom"
      sensor_type: "lidar"
      pointcloud_topic: "pointcloud"

      # Go2's internal solid-state LiDAR has moderate density; 0.3m voxels
      # give enough detail for ScanContext without blowing up memory.
      voxel_size: 0.3

      # The Go2 LiDAR produces fewer points than an Ouster.
      # Lower this threshold so ICP verification still succeeds.
      registration_min_inliers: 30

      # Generate a keyframe every 0.5 m of travel — reasonable for indoor/outdoor Go2 use.
      keyframe_generation_ratio_distance: 0.5

      # Share at most 3 inter-robot matches per detection round.
      # Increase if you have a fast network; lower if bandwidth is tight.
      inter_robot_loop_closure_budget: 3
      inter_robot_detection_period_sec: 5

      enable_sparsification: true
      use_vertex_cover_selection: true
      intra_loop_min_inbetween_keyframes: 20
      similarity_threshold: 0.75   # slightly relaxed vs. Ouster default (0.8)
      global_descriptor_technique: "scancontext"

      max_queue_size: 10
      detection_publication_period_sec: 0.5
      detection_publication_max_elems_per_msg: 100
      enable_intra_robot_loop_closures: true

      # Go2 LiDAR streams at ~7 Hz; allow 0.2 s sync slop between cloud and odom.
      pointcloud_odom_approx_time_sync_s: 0.2

      map_manager_process_period_ms: 100
      global_descriptors_topic: "global_descriptors"

    neighbor_management:
      enable_neighbor_monitoring: true
      heartbeat_period_sec: 1.0
      max_heartbeat_delay_sec: 5.0
      # Give robots a moment to connect before expecting neighbors
      init_delay_sec: 8.0

    backend:
      pose_graph_optimization_start_period_ms: 10000
      pose_graph_optimization_loop_period_ms: 100
      max_waiting_time_sec: 3600
      enable_broadcast_tf_frames: true

    evaluation:
      enable_logs: false
      log_folder: "results"
      enable_gps_recording: false
      gps_topic: "gps/fix"
      enable_sparsification_comparison: false

    visualization:
      enable: true
      publishing_period_ms: 1000
